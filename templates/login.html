<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        SecureOps Login
    </title>

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='login.css') }}"
    >

    <!-- FONT AWESOME -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body>

    <!-- PREMIUM BACKGROUND -->

    <div class="luxury-bg">

        <span class="lux-line line1"></span>

        <span class="lux-line line2"></span>

        <span class="lux-line line3"></span>

    </div>

    <!-- FLOATING GLOW -->

    <div class="floating-orb orb1"></div>

    <div class="floating-orb orb2"></div>

    <div class="floating-orb orb3"></div>

    <!-- MAIN CONTAINER -->

    <div class="login-wrapper">

        <!-- LEFT -->

        <div class="login-left">

            <p class="mini-title">

                SECURE DEVSECOPS PLATFORM

            </p>

            <h1>

                Build secure <br>
                modern workflows.

            </h1>

            <p class="description">

                Create, manage and secure
                your cloud infrastructure with
                enterprise-grade monitoring and automation.

            </p>

        </div>
        

        <!-- RIGHT -->

        <div class="login-right">

            <div class="login-card">

                <h2>

                    Welcome Back

                </h2>

                <p class="login-sub">

                    Sign in to continue.

                </p>

                <!-- ERROR -->

                {% if error %}

                <div class="error-box">

                    {{ error }}

                </div>

                {% endif %}

                <!-- FORM -->

                <form method="POST">

                    <!-- EMAIL -->

                    <div class="input-group">

                        <i class="fa-solid fa-envelope"></i>

                        <input
                            type="email"
                            name="email"
                            placeholder="Email Address"
                            required
                        >

                    </div>

                    <!-- PASSWORD -->

                    <div class="input-group">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            name="password"
                            placeholder="Password"
                            required
                        >

                    </div>

                    <!-- BUTTON -->

                    <button
                        type="submit"
                        class="login-btn"
                    >

                        Login

                    </button>

                </form>

                <!-- OPTIONS -->

                <div class="login-options">

                    <label class="remember-box">

                        <input type="checkbox">

                        <span>

                            Remember Me

                        </span>

                    </label>

                    <a
                        href="/forgot-password"
                        class="forgot-link"
                    >

                        Forgot Password?

                    </a>

                </div>

                <!-- REGISTER -->

                <p class="bottom-text">

                    New here?

                    <a href="/register">

                        Create Account

                    </a>

                </p>

            </div>

        </div>

    </div>

</body>

</html>
